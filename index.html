<!doctype html>
<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>destruction altar</title>
        <meta name="description">

        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    </head>

    <body>
        <div id="content">
            
            <video id="video">
                <source src="videos/holy light.mp4" type="video/mp4">
            </video>
            <canvas id="composition" width="1920" height="1080"></canvas>

            <div id="form">

                <input type="text" id="inputText" name="inputText" placeholder="what?">

                <ul id="types">

                    <li class="typeRadio">
                        <input type="radio" id="light" name="type" value="0" checked>
                        <label for="light">holy light</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="fire" name="type" value="1">
                        <label for="fire">scourging fire</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="water" name="type" value="2">
                        <label for="water">crushing water</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="decay" name="type" value="3">
                        <label for="decay">inexorable decay</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="flesh" name="type" value="4">
                        <label for="flesh">overwhelm the flesh</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="gravity" name="type" value="5">
                        <label for="gravity">absolute gravity</label>
                    </li>

                </ul>

                <input id="submitButton" type="submit" value="destroy">

            </div>
            
        </div>

        <div id="colorOverlay"></div>

        <script type="text/javascript" src="composite.js"></script>

    </body>

</html>
