<!doctype html>
<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>destruction altar</title>
        <meta name="description">

        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    </head>

    <body>
        <div id="content">
            
            <img id="canvas" src="test.png">

            <div id="form">

                <input type="text" id="inputText" name="inputText" placeholder="what?">

                <ul id="types">

                    <li class="typeRadio">
                        <input type="radio" id="light" name="type" value="light" checked>
                        <label for="light">holy light</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="fire" name="type" value="fire">
                        <label for="fire">scourging fire</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="water" name="type" value="water">
                        <label for="water">crushing water</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="decay" name="type" value="decay">
                        <label for="decay">inexorable decay</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="flesh" name="type" value="flesh">
                        <label for="flesh">overwhelm the flesh</label>
                    </li>

                    <li class="typeRadio">
                        <input type="radio" id="gravity" name="type" value="gravity">
                        <label for="gravity">absolute gravity</label>
                    </li>

                </ul>

                <input id="submitButton" type="submit" value="destroy">

            </div>
            
        </div>

    </body>

</html>
